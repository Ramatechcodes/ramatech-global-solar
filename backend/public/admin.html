<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Ramatech</title>
<style>
body { font-family: Arial, sans-serif; background:#f4f6f8; padding:20px; }
h1 { color:#198754; margin-bottom:20px;}
table { width:100%; border-collapse:collapse; background:#fff;}
th, td { padding:10px; border:1px solid #ddd; font-size:14px;}
th { background:#198754; color:#fff; text-align:left;}
tr:nth-child(even){ background:#f9f9f9; }

@media only screen and (max-width:768px){
  table { display:block; overflow-x:auto; white-space:nowrap; }
  th, td { font-size:13px; }
}
</style>
</head>
<body>

<h1>📋 Registered Customers</h1>

<table id="dataTable">
  <thead>
    <tr>
      <th>Full Name</th>
      <th>Phone</th>
      <th>Email</th>
      <th>Nationality</th>
      <th>State</th>
      <th>LGA</th>
      <th>Postal Code</th>
      <th>Address / Landmark</th>
      <th>Installation</th>
      <th>Total (₦)</th>
      <th>Upfront (₦)</th>
      <th>Weekly (₦)</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
async function loadData() {
  try {
    const res = await fetch("/api/registrations");
    const data = await res.json();
    const tbody = document.querySelector("#dataTable tbody");
    tbody.innerHTML = "";

    data.forEach(item => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${item.name || "-"}</td>
        <td>${item.phone || "-"}</td>
        <td>${item.email || "-"}</td>
        <td>${item.nationality || "-"}</td>
        <td>${item.state || "-"}</td>
        <td>${item.lga || "-"}</td>
        <td>${item.postal_code || "-"}</td>
        <td>${item.full_address || "-"}${item.nearest_landmark ? ' (Near: ' + item.nearest_landmark + ')' : ''}</td>
        <td>${item.installation_type || "-"}</td>
        <td>${item.total?.toLocaleString() || "-"}</td>
        <td>${item.upfront?.toLocaleString() || "-"}</td>
        <td>${item.weekly?.toLocaleString() || "-"}</td>
        <td>${new Date(item.date).toLocaleString('en-US', { 
          year:'numeric', month:'numeric', day:'numeric',
          hour:'numeric', minute:'numeric', second:'numeric',
          hour12:true 
        })}</td>
      `;
      tbody.appendChild(tr);
    });

  } catch (err) {
    console.error(err);
    alert("Failed to load registrations");
  }
}

loadData();
</script>

</body>
</html>
