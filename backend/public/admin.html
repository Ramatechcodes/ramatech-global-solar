<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Ramatech</title>
<style>
body { font-family: Arial, sans-serif; background:#f4f6f8; padding:20px; }
h1 { color:#198754; }
table { width:100%; border-collapse:collapse; background:#fff;}
th, td { padding:10px; border:1px solid #ddd; font-size:14px;}
th { background:#198754; color:#fff; }
tr:nth-child(even){ background:#f9f9f9; }
</style>
</head>
<body>
<h1>📋 Registered Customers</h1>
<table id="dataTable">
  <thead>
    <tr>
      <th>Full Name</th>
      <th>Phone</th>
      <th>Email</th>
      <th>Installation</th>
      <th>Total (₦)</th>
      <th>Upfront (₦)</th>
      <th>Weekly (₦)</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
async function loadData() {
  try {
    const res = await fetch("/api/registrations");
    const data = await res.json();
    const tbody = document.querySelector("#dataTable tbody");
    tbody.innerHTML = "";

    data.forEach(item => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${item.fullName || "-"}</td>
        <td>${item.phoneNumber || "-"}</td>
        <td>${item.email || "-"}</td>
        <td>${item.installationType || "-"} ${item.installationSpec ? '(' + item.installationSpec + ')' : ''}</td>
        <td>${item.payment?.total?.toLocaleString() || "-"}</td>
        <td>${item.payment?.upfront?.toLocaleString() || "-"}</td>
        <td>${item.payment?.weekly?.toLocaleString() || "-"}</td>
        <td>${new Date(item.createdAt).toLocaleDateString()}</td>
      `;
      tbody.appendChild(tr);
    });

  } catch (err) {
    alert("Failed to load registrations");
  }
}

loadData();
</script>
</body>
</html>
