<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
#dashboard { display:none; }
table { width:100%; border-collapse:collapse; background:#fff; }
th, td { padding:10px; border:1px solid #ddd; }
th { background:#198754; color:#fff; }
button { padding:5px 10px; cursor:pointer; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="adminPass" type="password" placeholder="Enter Admin Code ">
  <button onclick="login()">Login</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <h1>📋 Customers</h1>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Package</th>
        <th>Total</th>
        <th>Balance</th>
        <th>Weekly</th>
        <th>Weeks Paid</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
async function login(){
  const password = document.getElementById("adminPass").value;

  const res = await fetch("/api/admin/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ password }),
    credentials:"include"
  });

  if(res.ok){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadData();
  }else{
    document.getElementById("error").innerText = "Wrong code";
  }
}

async function loadData(){
  const res = await fetch("/api/registrations",{
    credentials:"include"
  });

  const data = await res.json();
  const tbody = document.getElementById("tbody");

  tbody.innerHTML = "";

  for(const item of data){

    const resUser = await fetch("/api/users/by-email?email="+item.email);
    const user = await resUser.json();

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${item.name}</td>
      <td>${item.email}</td>
      <td>${item.installation_type}</td>
      <td>₦${item.total}</td>
      <td>₦${item.balance?.toLocaleString()}</td>
      <td>₦${item.weekly}</td>
      <td>${user.weeks_paid}</td>
      <td>
        <button onclick="mark('${user.id}')">Mark Paid</button>
      </td>
    `;

    tbody.appendChild(tr);
  }
}

async function mark(userId){
  await fetch("/api/admin/pay-week",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ user_id: userId })
  });

  alert("✅ Updated");
  loadData();
}
</script>

</body>
</html>
